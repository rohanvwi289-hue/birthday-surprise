<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: radial-gradient(circle at top, #ffdde8, #ffe9f2, #ffd1dc, #17001f);
}

/* Steps */
.step { display: none; }
.step.active { display: block; }

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -40px;
  animation: float 6s linear infinite;
  font-size: 20px;
}
@keyframes float {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}

/* Game heart */
#catchHeart {
  position: absolute;
  font-size: 50px;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* Gift */
.gift-box {
  width: 150px;
  height: 110px;
  background: pink;
  border-radius: 15px;
  margin: auto;
  cursor: pointer;
  position: relative;
}
.gift-lid {
  position: absolute;
  width: 170px;
  height: 30px;
  background: red;
  top: -25px;
  left: -10px;
  transition: 0.4s;
}
.gift-box.open .gift-lid {
  transform: rotate(-25deg) translate(-20px, -40px);
}

/* Cake */
.flame {
  width: 20px;
  height: 30px;
  background: orange;
  border-radius: 50%;
  margin: auto;
  animation: flicker 0.3s infinite alternate;
}
@keyframes flicker {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body class="flex items-center justify-center h-screen text-center">

<div class="bg-white p-6 rounded-xl w-[90%] max-w-md">

<!-- STEP 0 -->
<div class="step active" id="step0">
  <h1 class="text-3xl font-bold mb-4">Hey Beautiful ❤️</h1>
  <button onclick="nextStep()" class="bg-pink-500 text-white px-6 py-2 rounded-full">
    Start Surprise
  </button>
</div>

<!-- STEP 1 -->
<div class="step" id="step1">
  <h2 class="text-2xl mb-3">Catch my heart 💖</h2>
  <p>(<span id="score">0</span>/5)</p>
  <div id="gameBox" class="relative h-64 border mt-4 rounded-lg">
    <div id="catchHeart">💖</div>
  </div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2 class="text-2xl mb-4">Your Gift 🎁</h2>
  <div class="gift-box" onclick="openGift(this)">
    <div class="gift-lid"></div>
  </div>
  <p id="giftMsg" class="hidden mt-4">This gift contains all my love ❤️</p>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <h2 class="text-2xl mb-4">Blow the candle 🎂</h2>
  <div id="flame" class="flame"></div>
  <button onclick="blowCandle()" class="mt-4 bg-pink-500 text-white px-6 py-2 rounded-full">
    Blow 🕯️
  </button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
  <h2 class="text-3xl mb-4">Happy Birthday ❤️</h2>
  <p id="message"></p>
  <button onclick="location.reload()" class="mt-4 bg-pink-500 text-white px-6 py-2 rounded-full">
    Replay
  </button>
</div>

</div>

<script>
let step = 0;
let score = 0;

function nextStep() {
  document.getElementById("step"+step).classList.remove("active");
  step++;
  document.getElementById("step"+step).classList.add("active");

  if(step === 1) moveHeart();
}

function moveHeart() {
  const box = document.getElementById("gameBox");
  const heart = document.getElementById("catchHeart");

  const maxX = box.clientWidth - 60;
  const maxY = box.clientHeight - 60;

  heart.style.left = Math.random() * maxX + "px";
  heart.style.top = Math.random() * maxY + "px";
}

document.getElementById("catchHeart").onclick = () => {
  score++;
  document.getElementById("score").innerText = score;

  if(score >= 5){
    setTimeout(()=> nextStep(), 500);
  } else {
    moveHeart();
  }
};

function openGift(el) {
  el.classList.add("open");
  document.getElementById("giftMsg").classList.remove("hidden");
  setTimeout(()=> nextStep(), 2000);
}

function blowCandle() {
  document.getElementById("flame").style.display = "none";
  setTimeout(()=> {
    nextStep();
    typeText();
  }, 1000);
}

function typeText() {
  let text = "Happy Birthday ❤️ You are the most special person in my life!";
  let i = 0;

  function typing(){
    if(i < text.length){
      document.getElementById("message").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }
  typing();
}

/* Floating hearts */
setInterval(()=>{
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.className = "heart";
  h.style.left = Math.random()*100 + "vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
